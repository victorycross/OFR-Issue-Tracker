Screens:
  SubmitScreen:
    Properties:
      Fill: =RGBA(245, 247, 250, 1)
      LoadingSpinnerColor: =RGBA(202, 80, 16, 1)
    Children:
      - Rectangle1:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            BorderThickness: =2
            DisabledFill: =RGBA(255, 191, 0, 1)
            Fill: =RGBA(255, 191, 0, 1)
            FocusedBorderThickness: =4
            Height: =55
            HoverFill: =RGBA(255, 191, 0, 1)
            PressedFill: =RGBA(255, 191, 0, 1)
            Width: =1366
      - Btn_Submit_Dashboard:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(0, 0, 0, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(255, 255, 255, 1)
            FocusedBorderColor: =ColorFade(Self.Fill, -75%)
            Font: =Font.Arial
            HoverBorderColor: =RGBA(0, 0, 0, 0)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: |
              =RGBA(240,240,240,1)
            OnSelect: =Navigate(DashboardScreen, ScreenTransition.Fade)
            PressedBorderColor: =ColorFade(RGBA(202, 80, 16, 1), -50%)
            PressedColor: =RGBA(255, 255, 255, 1)
            PressedFill: |
              =RGBA(210,215,226,1)
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Size: =14
            Text: ="< Dashboard"
            Width: =130
            X: =10
            Y: =8
      - Lbl_Submit_HeaderTitle:
          Control: Label@2.5.1
