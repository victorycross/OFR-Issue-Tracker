            BorderThickness: =2
            Color: =RGBA(51, 51, 51, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            Font: =Font.Arial
            FontWeight: =FontWeight.Bold
            Height: =30
            Size: =14
            Text: ="Topic | Issue | Problem"
            Width: =250
            X: =60
            Y: =90
      - Txt_Submit_Title:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(166, 166, 166, 1)
            Color: =RGBA(51, 51, 51, 1)
            Default: =""
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            HintText: ="Enter issue title..."
            HoverBorderColor: =ColorFade(RGBA(202, 80, 16, 1), -30%)
            HoverColor: =RGBA(51, 51, 51, 1)
            HoverFill: =RGBA(255, 255, 255, 1)
            PressedBorderColor: =RGBA(202, 80, 16, 1)
            PressedColor: =RGBA(51, 51, 51, 1)
            PressedFill: =RGBA(255, 255, 255, 1)
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =560
            X: =60
            Y: =120
      - Lbl_Submit_Description:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            BorderThickness: =2
            Color: =RGBA(51, 51, 51, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            Font: =Font.Arial
            FontWeight: =FontWeight.Bold
            Text: ="Description"
            X: =60
            Y: =170
      - Txt_Submit_Description:
          Control: Classic/TextInput@2.3.2
          Properties:
            BorderColor: =RGBA(166, 166, 166, 1)
            Color: =RGBA(51, 51, 51, 1)
            Default: =""
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            Height: =100
            HintText: ="Describe the issue..."
            HoverBorderColor: =ColorFade(RGBA(202, 80, 16, 1), -30%)
            HoverColor: =RGBA(51, 51, 51, 1)
            HoverFill: =RGBA(255, 255, 255, 1)
            Mode: =TextMode.MultiLine
            PressedBorderColor: =RGBA(202, 80, 16, 1)
            PressedColor: =RGBA(51, 51, 51, 1)
            PressedFill: =RGBA(255, 255, 255, 1)
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =560
            X: =60
            Y: =200
      - Lbl_Submit_Priority:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            BorderThickness: =2
            Color: =RGBA(51, 51, 51, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            Font: =Font.Arial
            FontWeight: =FontWeight.Bold
            Size: =14
            Text: ="Priority"
            X: =60
            Y: =310
      - Dd_Submit_Priority:
          Control: Classic/DropDown@2.3.1
          Properties:
            BorderColor: =RGBA(166, 166, 166, 1)
            ChevronBackground: =RGBA(255, 255, 255, 1)
            ChevronDisabledBackground: =RGBA(244, 244, 244, 1)
            ChevronDisabledFill: =RGBA(166, 166, 166, 1)
            ChevronFill: =RGBA(33, 33, 33, 1)
            ChevronHoverBackground: =RGBA(212, 212, 212, 1)
            ChevronHoverFill: =RGBA(33, 33, 33, 1)
            Color: =RGBA(51, 51, 51, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            Font: =Font.'Segoe UI'
            HoverBorderColor: =ColorFade(RGBA(202, 80, 16, 1), -30%)
            HoverColor: =RGBA(51, 51, 51, 1)
            HoverFill: =RGBA(212, 212, 212, 1)
            Items: =["High", "Medium", "Low"]
            Items.Value: =Value
            PaddingBottom: =5
            PaddingLeft: =12
            PaddingRight: =5
            PaddingTop: =5
            PressedBorderColor: =ColorFade(RGBA(202, 80, 16, 1), -30%)
            PressedColor: =RGBA(255, 255, 255, 1)
            PressedFill: =RGBA(202, 80, 16, 1)
            SelectionColor: =RGBA(255, 255, 255, 1)
            SelectionFill: =RGBA(202, 80, 16, 1)
            Width: =560
            X: =60
            Y: =340
      - Lbl_Submit_IssuedByValue:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            BorderThickness: =2
            Color: =RGBA(51, 51, 51, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Size: =14
            Text: ="Submitted By"
            X: =60
            Y: =460
      - Lbl_Submit_IssuedBy:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            BorderThickness: =2
            Color: =RGBA(51, 51, 51, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            Font: =Font.'Segoe UI'
            Size: =14
            Text: =User().FullName
            X: =60
            Y: =490
      - Btn_Submit_Issue:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(0, 0, 0, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(255, 191, 0, 1)
            FocusedBorderColor: =ColorFade(Self.Fill, -75%)
            Font: =Font.Arial
            HoverBorderColor: =RGBA(0, 0, 0, 0)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: |
              =RGBA(195,76,47,1)
            OnSelect: |-
              =If(IsBlank(Txt_Submit_Title.Text), Notify("Title is required", NotificationType.Error), Patch(OFR_IntakeQueue, Defaults(OFR_IntakeQueue), {Title: Txt_Submit_Title.Text, Description: Txt_Submit_Description.Text, Priority: {Value: Dd_Submit_Priority.Selected.Value}, FunctionalGroup: {Value: Dd_Submit_FuncGroup.Selected.Value}, TriageStatus: {Value: "Pending"}, DateSubmitted: Now()}); Reset(Txt_Submit_Title); Reset(Txt_Submit_Description); Reset(Dd_Submit_Priority); Reset(Dd_Submit_FuncGroup); UpdateContext({showSuccess: true}))
            PressedBorderColor: =ColorFade(RGBA(202, 80, 16, 1), -50%)
            PressedColor: =RGBA(255, 255, 255, 1)
            PressedFill: |
              =RGBA(167,69,44,1)
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Text: ="Submit Issue"
            Width: =560
            X: =60
            Y: =540
      - Rect_Submit_HeaderBar:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            BorderThickness: =2
            DisabledFill: =RGBA(166, 166, 166, 1)
            Fill: =RGBA(230, 230, 230, 1)
            FocusedBorderThickness: =4
            Height: =768
            HoverFill: =RGBA(255, 255, 255, 1)
            PressedFill: =RGBA(255, 255, 255, 1)
            Visible: =showSuccess
            Width: =1366
      - Lbl_Submit_Success:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            BorderThickness: =2
            Color: =RGBA(51, 51, 51, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            Font: =Font.Arial
            FontWeight: =FontWeight.Bold
            Height: =90
            Size: =24
            Text: ="Issue Submitted Successfully!"
            Visible: =showSuccess
            Width: =400
            X: =483
            Y: =260
      - Btn_Submit_BackToDashboard:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(202, 80, 16, 1)
            FocusedBorderColor: =ColorFade(Self.Fill, -75%)
            Font: =Font.'Segoe UI'
            HoverBorderColor: =RGBA(0, 0, 0, 0)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: |
              =RGBA(240,240,240,1)
            OnSelect: |-
              =UpdateContext({showSuccess: false}); Navigate(DashboardScreen, ScreenTransition.Fade)
            PressedBorderColor: =ColorFade(RGBA(202, 80, 16, 1), -50%)
