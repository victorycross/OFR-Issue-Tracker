              =Patch(OFR_UpdateHistory, Defaults(OFR_UpdateHistory), {ParentItemID: selectedIssue.ItemID, Notes: Txt_Tracker_UpdateNotes.Text, StatusAtUpdate: {Value: Dd_Tracker_Status.Selected.Value}, UpdatedBy: User().FullName, UpdateDate: Now()}); Patch(OFR_Issues, LookUp(OFR_Issues, ItemID = selectedIssue.ItemID), {Status: {Value: Dd_Tracker_Status.Selected.Value}, FunctionalGroup: Dd_Tracker_ReassignGroup.Selected, LastUpdated: Now()}); Reset(Txt_Tracker_UpdateNotes); Reset(Dd_Tracker_Status); Reset(Dd_Tracker_ReassignGroup); Notify("Update saved", NotificationType.Success); UpdateContext({showPanel: false})
            PressedBorderColor: =ColorFade(RGBA(202, 80, 16, 1), -50%)
