- Btn_Dash_HamburgerMenu:
    Control: Classic/Button@2.2.0
    Properties:
      Text: ="☰"
      X: =10
      Y: =8
      Width: =45
      Height: =40
      Fill: =RGBA(0,0,0,0)
      Color: =RGBA(255,255,255,1)
      HoverFill: =RGBA(180,60,0,1)
      PressedFill: =RGBA(150,50,0,1)
      HoverColor: =RGBA(255,255,255,1)
      PressedColor: =RGBA(255,255,255,1)
      BorderColor: =RGBA(0,0,0,0)
      HoverBorderColor: =RGBA(0,0,0,0)
      PressedBorderColor: =RGBA(0,0,0,0)
      DisabledBorderColor: =RGBA(0,0,0,0)
      Font: =Font.'Segoe UI'
      FontWeight: =FontWeight.Bold
      Size: =20
      OnSelect: |
        =UpdateContext({varShowNav: !varShowNav})
      RadiusTopLeft: =4
      RadiusTopRight: =4
      RadiusBottomLeft: =4
      RadiusBottomRight: =4

- Btn_Dash_SubmitCTA:
    Control: Classic/Button@2.2.0
    Properties:
      Text: ="+ Submit New Issue"
      X: =1150
      Y: =8
      Width: =200
      Height: =40
      Fill: =RGBA(208,74,2,1)
      Color: =RGBA(255,255,255,1)
      HoverFill: =RGBA(195,76,47,1)
      PressedFill: =RGBA(167,69,44,1)
      HoverColor: =RGBA(255,255,255,1)
      PressedColor: =RGBA(255,255,255,1)
      BorderColor: =RGBA(0,0,0,0)
      HoverBorderColor: =RGBA(0,0,0,0)
      PressedBorderColor: =RGBA(0,0,0,0)
      DisabledBorderColor: =RGBA(0,0,0,0)
      Font: =Font.'Segoe UI'
      FontWeight: =FontWeight.Semibold
      Size: =13
      OnSelect: =Navigate(SubmitScreen, ScreenTransition.Fade)
      RadiusTopLeft: =4
      RadiusTopRight: =4
      RadiusBottomLeft: =4
      RadiusBottomRight: =4

- Rect_Dash_NavOverlay:
    Control: Classic/Rectangle@2.4.0
    Properties:
      X: =0
      Y: =0
      Width: =1366
      Height: =768
      Fill: =RGBA(0,0,0,0.4)
      Visible: =varShowNav
      OnSelect: |
        =UpdateContext({varShowNav: false})

- Rect_Dash_NavDropdown:
    Control: Classic/Rectangle@2.4.0
    Properties:
      X: =0
      Y: =55
      Width: =260
      Height: =225
      Fill: =RGBA(255,255,255,1)
      Visible: =varShowNav
      BorderColor: =RGBA(200,200,200,1)
      BorderThickness: =1
